; LTSIA — configurazione locale
; Sovrascrive ~/.ltsia/config.ini; le flag CLI hanno priorità assoluta.

; ── ThinkingAgent (Ollama) ────────────────────────────────────────────────────
[ltsia]
thinking_host  = 192.168.250.203
thinking_port  = 11434
thinking_model = qwen3-coder:30b
context_window = 32768
compaction     = 0.50

; ── ExecutionAgent (vLLM / OpenAI-compatible) ─────────────────────────────────
exec_host       = 10.149.245.212
exec_port       = 8807
exec_model      = qwen3-instruct
exec_max_tokens = 8192

; ── Voice / TTS ───────────────────────────────────────────────────────────────
; Voce edge-tts per la risposta parlata in modalità voice.
; Richiede: pip install edge-tts
; Per disabilitare: tts_voice = disabled
; Altre voci italiane: it-IT-DiegoNeural  it-IT-ElsaNeural
tts_voice = it-IT-IsabellaNeural
tts_rate  = +20%

; ── Runtime ───────────────────────────────────────────────────────────────────
max_retries  = 5
http_timeout = 300
verbose      = false

; Con Ollama (pull nomic-embed-text prima)
embedding_host  = 192.168.250.203
embedding_port  = 11434
embedding_model = nomic-embed-text
embedding_api   = ollama

; ── Qdrant (memoria a lungo termine vettoriale) ──────────────────────────────
; Avvia con:  ~/.ltsia/qdrant/start.sh
; Dashboard:  http://localhost:6333/dashboard
qdrant_host        = localhost
qdrant_port        = 6333
qdrant_collection  = ltsia_longterm
qdrant_vector_size = 768

; ── Memoria tiered (short / medium / long) ──────────────────────────────────
; Soglia sotto cui l'orchestratore attiva il fallback web (0.0 - 1.0)
memory_web_fallback_threshold = 0.5
; TTL della memoria a medio termine (in giorni). Le rooms non toccate vengono droppate.
memory_medium_ttl_days = 30
; Quanti "drawers" (turni verbatim) tiene la short-term per scope
memory_short_drawers = 20
